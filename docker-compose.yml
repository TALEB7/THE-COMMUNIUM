version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: communium-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: communium
      POSTGRES_PASSWORD: communium_secret
      POSTGRES_DB: communium_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U communium -d communium_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: communium-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch (Full-text search)
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: communium-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: communium_meili_key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AI Microservice (FastAPI + sentence-transformers)
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: communium-ai
    restart: unless-stopped
    environment:
      MODEL_NAME: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: info
    ports:
      - "8000:8000"
    volumes:
      - ai_model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local
  ai_model_cache:
    driver: local
